<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ozon Fake Detector</title>
    <style>
    body {
        background-color: #0b1c2d;
        font-family: monospace;
    }

    .window {
        width: 840px;
        margin: 100px auto;
        background-color: #e0e0e0;
        border: 2px solid #000;
        box-shadow: 10px 10px 0 #000;
    }

    .title {
        background-color: #f3b8b8;
        font-family: monospace;
        font-size: 16px;
        padding: 6px;
        text-align: center;
    }

    .content {
        padding: 16px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-family: monospace;
        font-size: 16px;
    }

    input[type="file"] {
        width: 100%;
        font-family: monospace;
        font-size: 16px;
        padding: 6px;
        margin-bottom: 16px;
        background-color: #ffffff;
        border: 1px solid #000;
    }

    .buttons {
        text-align: center;
    }

    button {
        font-family: monospace;
        font-size: 16px;
        padding: 6px 16px;
        margin: 0 8px;
        cursor: pointer;
        border: 1px solid #000;
        background-color: #d0d0d0;
    }

    button:hover {
        background-color: #c0c0c0;
    }

    .result {
        font-family: monospace;
        font-size: 16px;
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #000;
        text-align: center;
        background-color: #f0f0f0;
    }

    .loading {
        display: none;
        margin-top: 16px;
        text-align: center;
        color: #666;
    }
    </style>
</head>
<body>

<div class="window">
    <div class="title">Ozon Fake Detector</div>

    <div class="content">
        <form id="predictionForm" enctype="multipart/form-data">
            <label>Загрузить изображение:</label>
            <input type="file" name="image" accept="image/*" required>

            <label>Загрузить датафрейм (CSV/Excel):</label>
            <input type="file" name="dataframe" accept=".csv,.xlsx,.xls" required>

            <div class="buttons">
                <button type="submit">Узнать</button>
            </div>
        </form>

        <div class="loading" id="loading">
            Обработка...
        </div>

        {% if result %}
        <div class="result">
            Результат: {{ result }}
        </div>
        {% endif %}
    </div>
</div>

<script>
document.getElementById('predictionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const loading = document.getElementById('loading');
    const button = this.querySelector('button');
    
    // Показываем загрузку
    loading.style.display = 'block';
    button.disabled = true;
    
    try {
        const response = await fetch('/api/v1/predict/upload', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (response.ok) {
            // Перенаправляем с результатом
            if (result.prediction) {
                // Single prediction
                window.location.href = `/?result=${result.prediction} (${(result.confidence * 100).toFixed(1)}%)`;
            } else if (result.predictions) {
                // Batch prediction
                const fakeCount = result.predictions.filter(p => p === 'FAKE').length;
                const realCount = result.predictions.filter(p => p === 'REAL').length;
                window.location.href = `/?result=Batch: ${fakeCount} FAKE, ${realCount} REAL`;
            }
        } else {
            alert('Ошибка: ' + (result.detail || 'Неизвестная ошибка'));
        }
    } catch (error) {
        alert('Ошибка сети: ' + error.message);
    } finally {
        loading.style.display = 'none';
        button.disabled = false;
    }
});

{% if result %}
// Убираем result из URL после показа
window.history.replaceState({}, document.title, "/");
{% endif %}
</script>

</body>
</html>
